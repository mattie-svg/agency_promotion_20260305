      '<div class="metric"><p class="metric-label">유상 전환율</p><p class="metric-value">'+Math.round(convCount/convTotal*100)+'%</p><p class="metric-sub">'+convCount+'/'+convTotal+'개 유상 재집행</p></div>'+
      '<div class="metric"><p class="metric-label">총 지급 캐시</p><p class="metric-value" style="font-size:16px">'+fmt(convReward)+'</p></div>'+
      '<div class="metric"><p class="metric-label">이후 유상 소진</p><p class="metric-value" style="font-size:16px">'+fmt(convPostCash)+'</p><p class="metric-sub">지급 대비 '+(convPostCash/convReward).toFixed(1)+'배</p></div>';
  }

  // 지급월별 전환율 차트
  const convMonthCanvas = document.getElementById('convMonthChart');
  if(convMonthCanvas){
    const months3 = ['3월','4월','5월'];
    const mConvData = months3.map(m=>{
      const g = paidData.filter(d=>d.pay===m);
      return {conv:g.filter(d=>convClassify(d)===1).length, gift:g.filter(d=>convClassify(d)===2).length, none:g.filter(d=>convClassify(d)===0).length, total:g.length};
    });
    charts.push(new Chart(convMonthCanvas,{
      type:'bar',
      data:{labels:months3, datasets:[
        {label:'유상 전환', data:mConvData.map(d=>Math.round(d.conv/d.total*100)), backgroundColor:'#3266ad', borderRadius:3},
        {label:'무상만 소진', data:mConvData.map(d=>Math.round(d.gift/d.total*100)), backgroundColor:'#9FE1CB', borderRadius:3},
        {label:'미소진', data:mConvData.map(d=>Math.round(d.none/d.total*100)), backgroundColor:'#e8e6df', borderRadius:3},
      ]},
      options:{responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.raw+'%'}}},
        scales:{x:{stacked:true, grid:{display:false}, ticks:{color:'#888780', font:{size:11}}},
          y:{stacked:true, max:100, ticks:{color:'#888780', callback:v=>v+'%'}, grid:{color:'rgba(0,0,0,0.05)'}}}}
    }));
  }

  // tier별 전환율 차트
  const convTierCanvas = document.getElementById('convTierChart');
  if(convTierCanvas){
    const tierConvData = ['50%','20%'].map(t=>{
      const g = paidData.filter(d=>d.tier===t);
      return {conv:g.filter(d=>convClassify(d)===1).length, gift:g.filter(d=>convClassify(d)===2).length, none:g.filter(d=>convClassify(d)===0).length, total:g.length};
    });
    charts.push(new Chart(convTierCanvas,{
      type:'bar',
      data:{labels:['50% 티어','20% 티어'], datasets:[
        {label:'유상 전환', data:tierConvData.map(d=>Math.round(d.conv/d.total*100)), backgroundColor:'#3266ad', borderRadius:3},
        {label:'무상만 소진', data:tierConvData.map(d=>Math.round(d.gift/d.total*100)), backgroundColor:'#9FE1CB', borderRadius:3},
        {label:'미소진', data:tierConvData.map(d=>Math.round(d.none/d.total*100)), backgroundColor:'#e8e6df', borderRadius:3},
      ]},
      options:{responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.raw+'%'}}},
        scales:{x:{stacked:true, grid:{display:false}, ticks:{color:'#888780', font:{size:11}}},
          y:{stacked:true, max:100, ticks:{color:'#888780', callback:v=>v+'%'}, grid:{color:'rgba(0,0,0,0.05)'}}}}
    }));
  }

  const sumAgCanvas = document.getElementById('sumAgChart');
  if(sumAgCanvas){
    charts.push(new Chart(sumAgCanvas,{
      type:'bar',
      data:{
        labels:paidAg.map(d=>d.ag),
        datasets:[
          {label:'리텐션율',data:paidAg.map(d=>Math.round(d.ret/d.total*100)),backgroundColor:'#3266ad',borderRadius:3},
          {label:'현재 활성',data:paidAg.map(d=>Math.round(d.active/d.total*100)),backgroundColor:'#1D9E75',borderRadius:3},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.raw+'%'}}},
        scales:{
          x:{grid:{display:false},ticks:{color:'#888780',font:{size:10},maxRotation:40}},
          y:{max:100,ticks:{color:'#888780',callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.05)'}}
        }}
    }));
  }

  // 에이전시 인사이트 카드
  const agInsights = [
    {col:'#1D9E75', title:'비에이티 · 플레이디 — 소규모지만 리텐션 최우수', desc:'비에이티(마켓보로·HUG)와 플레이디(브이아이피키드·롯데호텔·메디25)는 계정 수는 적지만 재집행률 100%예요. 에이전시가 광고주 캠페인을 밀착 관리할수록 리텐션이 높아지는 패턴이에요.'},
    {col:'#D85A30', title:'세일업 — 계정 수 많지만 현재 활성이 낮아요', desc:'세일업 소속 계정들은 프로모션 기간 소진은 컸지만, 휴대폰성지 폰킹처럼 프로모션 후 바로 멈춘 케이스가 있어요. 프로모션 자체가 목적이었던 계정과 자생적으로 집행한 계정이 섞여 있어요.'},
    {col:'#3266ad', title:'프로그레스미디어 — 가장 많은 계정, 리텐션은 중간', desc:'가장 많은 계정을 신청한 에이전시지만 리텐션율은 중간 수준이에요. 샤브20처럼 꾸준히 집행 중인 계정도 있고, 젓갈이야기처럼 조기 이탈한 소규모 계정도 있어서 편차가 커요.'},
    {col:'#888780', title:'나스미디어 · 디엠씨미디어 · 디플랜360 — 지급 후 전원 이탈', desc:'세 에이전시 모두 지급을 받은 계정이 프로모션 이후 재집행하지 않았어요. 대형 브랜드 일회성 캠페인 성격이 강한 케이스예요.'},
  ];

  const agInsEl = document.getElementById('sumAgInsights');
  if(agInsEl){
    agInsEl.innerHTML = agInsights.map(ins=>
      '<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f1efe8;">'+
      '<div style="width:8px;height:8px;border-radius:50%;background:'+ins.col+';margin-top:4px;flex-shrink:0"></div>'+
      '<div><p style="font-size:12px;font-weight:500;color:#1a1a18;margin:0 0 3px">'+ins.title+'</p>'+
      '<p style="font-size:12px;color:#5f5e5a;margin:0;line-height:1.6">'+ins.desc+'</p></div>'+
      '</div>'
    ).join('').replace(/border-bottom[^;]+;(?=[^<]*<\/div><\/div>\s*$)/, '');
  }

  // 전환율 인사이트 카드
  const convInsEl = document.getElementById('convInsights');
  if(convInsEl){
    const giftOnlyNames = ['센스맘','폰킹','더금융서비스','PLAYD_메디25','이야기모바일','기업생각','맞춤영양제 메디코치','로이파트너스'];
    const giftOnlyCount2 = paidData.filter(d=>convClassify(d)===2).length;
    const noneCount2 = paidData.filter(d=>convClassify(d)===0).length;
    convInsEl.innerHTML = [
      {col:'#3266ad',
       title:'지급 계정 '+convTotal+'개 중 '+convCount+'개('+Math.round(convCount/convTotal*100)+'%)가 무상 캐시 수령 후에도 유상 집행을 이어갔어요',
       desc:'단순 캐시백 수령 후 이탈이 아니라, 프로모션 이후에도 본인 예산으로 광고를 계속 집행했다는 의미예요. 유상 먼저 써야 캐시를 받는 구조에서 이후에도 유상을 이어간다는 건 플랫폼에서 실제 성과를 체감한 신호예요.'},
      {col:'#1D9E75',
       title:'유상 전환 계정의 이후 유상 소진이 지급 캐시 총액의 약 '+((convPostCash/convReward).toFixed(1))+'배',
       desc:'지급한 캐시 '+fmt(convReward)+' 대비, 유상 전환 '+convCount+'개 계정의 이후 유상 소진 합계는 '+fmt(convPostCash)+'이에요. 지급 비용 대비 실질 유상 집행 유도 효과가 확인됐어요.'},
      {col:'#D85A30',
       title:'무상만 소진하고 이탈한 '+giftOnlyCount2+'개 계정은 일회성 캠페인 성격이 강해요',
       desc:giftOnlyNames.join(', ')+' — 특정 기간·목적 캠페인으로 신청한 계정들이에요. 다음 프로모션에서는 장기 집행 의향이 있는 계정을 선별하는 기준이 필요해요.'},
    ].map(ins=>
      '<div style="display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #f1efe8">'+
      '<div style="width:8px;height:8px;border-radius:50%;background:'+ins.col+';margin-top:4px;flex-shrink:0"></div>'+
      '<div><p style="font-size:12px;font-weight:500;color:#1a1a18;margin:0 0 4px">'+ins.title+'</p>'+
      '<p style="font-size:12px;color:#5f5e5a;margin:0;line-height:1.6">'+ins.desc+'</p></div>'+
      '</div>'
    ).join('').replace(/border-bottom[^;]+;(?=[^<]*<\/div><\/div>\s*$)/, '');
  }
}

render('all');

</script>
<style>
  .sum-tbl th { font-size:11px;font-weight:500;color:#888780;border-bottom:1px solid #e8e6df;padding:7px 10px;text-align:right;white-space:nowrap; }
  .sum-tbl th:first-child { text-align:left; }
  .sum-tbl td { padding:7px 10px;border-bottom:1px solid #f1efe8;text-align:right;font-size:12px; }
  .sum-tbl td:first-child { text-align:left;font-weight:500; }
  .sum-tbl tr:last-child td { border-bottom:none;font-weight:500;background:#f5f4ef; }
  .bhi { background:#eaf3de;color:#27500a; }
  .bmd { background:#e6f1fb;color:#0c447c; }
  .blo { background:#fcebeb;color:#791f1f; }
  .ins-card { background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:14px 16px; }
  .ins-lbl { font-size:11px;color:#888780;margin:0 0 5px; }
  .ins-val { font-size:15px;font-weight:500;margin:0 0 4px; }
  .ins-desc { font-size:12px;color:#5f5e5a;margin:0;line-height:1.6; }
</style>

</body>
